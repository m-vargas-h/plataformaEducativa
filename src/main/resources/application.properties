spring.application.name=PlataformaEducativa
server.port=8080

# H2
spring.datasource.url=jdbc:h2:mem:plataformaeducativa
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Azure AD B2C - OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWK_SET_URI}

# AWS S3
aws.accessKey=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN}
aws.region=${AWS_REGION}
aws.s3.bucketName=${AWS_BUCKET_NAME}
