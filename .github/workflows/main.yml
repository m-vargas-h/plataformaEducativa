name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # Paso 5: Configurar credenciales de AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5: Agregar clave SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 5.6: Generar application.yml con variables de entorno en EC2
      - name: Generate application.yml on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            mkdir -p ~/config
            cat > ~/config/application.yml << YML
            spring:
              security:
                oauth2:
                  resourceserver:
                    jwt:
                      issuer-uri: ${{ secrets.AZURE_ISSUER_URI }}
                      jwk-set-uri: ${{ secrets.AZURE_JWK_SET_URI }}
            aws:
              accessKey: ${{ secrets.AWS_ACCESS_KEY }}
              secretKey: ${{ secrets.AWS_SECRET_KEY }}
              sessionToken: ${{ secrets.AWS_SESSION_TOKEN }}
              region: ${{ secrets.AWS_REGION }}
              s3:
                bucketName: ${{ secrets.AWS_BUCKET_NAME }}
            YML
          EOF

      # Paso 6: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            docker stop my-app || true && docker rm my-app || true
            docker run -d --name my-app -p 8080:8080 \
                -e AZURE_ISSUER_URI=${{ secrets.AZURE_ISSUER_URI }} \
                -e AZURE_JWK_SET_URI=${{ secrets.AZURE_JWK_SET_URI }} \
                -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
                -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
                -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
                -e AWS_REGION=${{ secrets.AWS_REGION }} \
                -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
                ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF